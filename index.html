<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Wiadomości SP24</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .refresh-data-btn { 
            position: absolute; top: 65px; left: 20px; background: #2d3e50; color: white; border: none; 
            padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; 
            display: flex; align-items: center; gap: 6px; z-index: 100; opacity: 0.8; transition: 0.2s;
        }
        .refresh-data-btn:hover { opacity: 1; background: #1a2531; }

        .flags { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .flag { width: 30px; border: 1px solid #ccc; cursor: pointer; }
        
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .hidden { display: none; }
        
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #2d3e50; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .news-item { text-align: left; border-bottom: 1px solid #eee; padding: 15px 0; }
        .admin-item { background: #f9f9f9; padding: 10px; margin-top: 8px; border-radius: 6px; text-align: left; border: 1px solid #eee; }
        
        .ip-list { margin-top: 20px; text-align: left; font-size: 11px; border-top: 2px solid #2d3e50; padding-top: 10px; max-height: 200px; overflow-y: auto; }
        .ip-row { padding: 4px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .btn-edit { background: #f39c12; padding: 4px 8px; font-size: 10px; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .btn-del { background: #e74c3c; padding: 4px 8px; font-size: 10px; color: white; border: none; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <button class="refresh-data-btn" onclick="manualRefresh()">
        <span>&#8635;</span> Odśwież dane
    </button>

    <div class="flags">
        <img src="https://upload.wikimedia.org/wikipedia/en/1/12/Flag_of_Poland.svg" class="flag" alt="PL">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/49/Flag_of_Ukraine.svg" class="flag" alt="UA">
    </div>

    <div id="section-banned" class="container hidden">
        <h2 style="color: red;">DOSTĘP OGRANICZONY</h2>
        <p id="banned-reason"></p>
    </div>

    <div id="section-login" class="container">
        <h2>System SP24</h2>
        <input type="password" id="password-input" placeholder="Hasło">
        <button onclick="checkAuth()">Zaloguj się</button>
        <p id="error-msg" style="color: red; font-size: 13px;"></p>
    </div>

    <div id="section-user" class="container hidden">
        <h2>Aktualności</h2>
        <div id="news-container">Pobieranie...</div>
        <button onclick="location.reload()" style="background:#666">Wyloguj</button>
    </div>

    <div id="section-admin" class="container hidden">
        <h2>Panel Admina</h2>
        <input type="text" id="post-title" placeholder="Tytuł wiadomości">
        <textarea id="post-content" rows="3" placeholder="Treść wiadomości..."></textarea>
        <button id="btn-save" onclick="handleSave()">Opublikuj</button>
        <button id="btn-cancel" class="hidden" onclick="resetForm()" style="background:#95a5a6">Anuluj edycję</button>
        
        <div id="admin-list" style="margin-top: 20px;"></div>

        <div class="ip-list">
            <b>Urządzenia (bans):</b>
            <div id="ip-bans-list"></div>
            <br>
            <b>Historia logowań (logs):</b>
            <div id="ip-logs-list"></div>
        </div>
        <button onclick="location.reload()" style="background:#666; margin-top:20px">Wyloguj</button>
    </div>

    <script>
        const SB_URL = "https://ggiidtwcfpfqwhrsxqre.supabase.co";
        const SB_KEY = "sb_publishable_65C-SaTkrEhz5I3aAr76mg_R1ZEzsyI";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let userIP = "";
        let editingTitle = null;

        // 1. Inicjalizacja zabezpieczeń
        async function initSecurity() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                userIP = ipData.ip;

                const { data: emg } = await sb.from('emergency').select('*').maybeSingle();
                if (emg?.on) return showBanned(emg.message || "Przerwa techniczna.");

                const { data: ban } = await sb.from('bans').select('*').eq('ip', userIP).maybeSingle();
                if (ban?.is_banned) return showBanned("Twoje IP jest zablokowane.");

                // Upsert IP w tabeli bans (bez zmiany attempts)
                await sb.from('bans').upsert({ ip: userIP, is_banned: false }, { onConflict: 'ip' });
            } catch (e) { console.error("Błąd init:", e); }
        }

        function showBanned(msg) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('section-banned').classList.remove('hidden');
            document.getElementById('banned-reason').innerText = msg;
        }

        // 2. Logowanie i zapisywanie logów
        async function checkAuth() {
            const pass = document.getElementById('password-input').value;
            
            if (pass === "klucz" || pass === "administracyjny") {
                const target = (pass === "administracyjny") ? 'section-admin' : 'section-user';
                
                // ZAPIS LOGU DO TABELI logs
                await sb.from('logs').insert([{ ip: userIP }]);
                
                show(target);
                loadData();
            } else {
                document.getElementById('error-msg').innerText = "Niepoprawne hasło.";
                // Zwiększ licznik prób w tabeli bans
                const { data } = await sb.from('bans').select('attempts').eq('ip', userIP).maybeSingle();
                await sb.from('bans').update({ attempts: (data?.attempts || 0) + 1 }).eq('ip', userIP);
            }
        }

        // 3. Pobieranie danych
        async function loadData() {
            const { data: news } = await sb.from('news').select('*').order('created_at', {ascending: false});
            if (news) {
                document.getElementById('news-container').innerHTML = news.map(n => `<div class="news-item"><b>${n.title}</b><p>${n.content}</p></div>`).join('');
                document.getElementById('admin-list').innerHTML = news.map(n => `
                    <div class="admin-item">
                        <b>${n.title}</b>
                        <div style="margin-top:5px; display:flex; gap:5px;">
                            <button class="btn-edit" onclick="prepareEdit('${n.title}', '${n.content}')">Edytuj</button>
                            <button class="btn-del" onclick="deletePost('${n.title}')">Usuń</button>
                        </div>
                    </div>
                `).join('');
            }

            // Listy dla admina
            if (!document.getElementById('section-admin').classList.contains('hidden')) {
                const { data: bans } = await sb.from('bans').select('*');
                document.getElementById('ip-bans-list').innerHTML = bans?.map(b => `<div class="ip-row"><span>${b.ip}</span> <span>Prób: ${b.attempts}</span></div>`).join('') || "";
                
                const { data: logs } = await sb.from('logs').select('*').order('created_at', {ascending: false}).limit(10);
                document.getElementById('ip-logs-list').innerHTML = logs?.map(l => `<div class="ip-row"><span>${l.ip}</span> <span>${new Date(l.created_at).toLocaleTimeString()}</span></div>`).join('') || "";
            }
        }

        // 4. Funkcje pomocnicze
        async function manualRefresh() { await loadData(); await initSecurity(); }
        setInterval(manualRefresh, 300000); // 5 min

        async function handleSave() {
            const t = document.getElementById('post-title').value;
            const c = document.getElementById('post-content').value;
            if (!t || !c) return;
            if (editingTitle) await sb.from('news').update({ title: t, content: c }).eq('title', editingTitle);
            else await sb.from('news').insert([{ title: t, content: c }]);
            resetForm(); loadData();
        }

        function prepareEdit(t, c) {
            editingTitle = t;
            document.getElementById('post-title').value = t;
            document.getElementById('post-content').value = c;
            document.getElementById('btn-save').innerText = "Zapisz zmiany";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            editingTitle = null;
            document.getElementById('post-title').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('btn-save').innerText = "Opublikuj";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function deletePost(t) { if (confirm("Usunąć?")) { await sb.from('news').delete().eq('title', t); loadData(); } }
        function show(id) { document.querySelectorAll('.container').forEach(c => c.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        initSecurity();
    </script>
</body>
</html>
