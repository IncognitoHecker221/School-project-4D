<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Wiadomości SP24</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* Zmniejszony i przesunięty przycisk odświeżania */
        .refresh-data-btn { 
            position: absolute; 
            top: 60px; /* Przesunięty niżej, żeby nie zasłaniać flag */
            left: 20px; 
            background: #2d3e50; 
            color: white; 
            border: none; 
            padding: 6px 12px; /* Mniejszy padding */
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 12px; /* Mniejsza czcionka */
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 100;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .refresh-data-btn:hover { background: #1a2531; opacity: 1; }
        .refresh-data-btn:active { transform: scale(0.95); }

        .flags { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .flag { width: 30px; border: 1px solid #ccc; cursor: pointer; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .hidden { display: none; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #2d3e50; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .news-item { text-align: left; border-bottom: 1px solid #eee; padding: 15px 0; }
        .admin-item { background: #f9f9f9; padding: 10px; margin-top: 8px; border-radius: 6px; text-align: left; border: 1px solid #eee; }
        .admin-btns { display: flex; gap: 5px; margin-top: 5px; }
        .btn-edit { background: #f39c12; flex: 1; padding: 5px; font-size: 12px; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .btn-del { background: #e74c3c; flex: 1; padding: 5px; font-size: 12px; border: none; color: white; border-radius: 4px; cursor: pointer; }
        .ip-list { margin-top: 20px; text-align: left; font-size: 12px; border-top: 2px solid #2d3e50; padding-top: 10px; max-height: 200px; overflow-y: auto; }
        .ip-row { padding: 5px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

    <button class="refresh-data-btn" onclick="manualRefresh()">
        <span>&#8635;</span> Odśwież
    </button>

    <div class="flags">
        <img src="https://upload.wikimedia.org/wikipedia/en/1/12/Flag_of_Poland.svg" class="flag" alt="PL">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/49/Flag_of_Ukraine.svg" class="flag" alt="UA">
    </div>

    <div id="section-banned" class="container hidden">
        <h2 style="color: red;">DOSTĘP ZABLOKOWANY</h2>
        <p id="banned-reason" style="font-weight: bold; margin-top: 10px;"></p>
    </div>

    <div id="section-login" class="container">
        <h2>Podaj hasło:</h2>
        <input type="password" id="password-input">
        <button onclick="checkAuth()">Zatwierdź</button>
        <p id="error-msg" style="color: red;"></p>
    </div>

    <div id="section-user" class="container hidden">
        <h2>Aktualności</h2>
        <div id="news-container">Ładowanie...</div>
        <button onclick="location.reload()" style="background:#666">Wyloguj</button>
    </div>

    <div id="section-admin" class="container hidden">
        <h2 id="admin-header">Nowa wiadomość</h2>
        <input type="text" id="post-title" placeholder="Tytuł">
        <textarea id="post-content" rows="3" placeholder="Treść..."></textarea>
        <button id="btn-save" onclick="handleSave()">Opublikuj</button>
        <button id="btn-cancel" class="hidden" onclick="resetForm()" style="background:#95a5a6">Anuluj</button>
        <hr style="margin: 20px 0;">
        <div id="admin-list"></div>
        <div class="ip-list">
            <h4>Logi Bezpieczeństwa (IP):</h4>
            <div id="ip-admin-container">Pobieranie...</div>
        </div>
        <button onclick="location.reload()" style="background:#666; margin-top:20px">Wyloguj</button>
    </div>

    <script>
        const SB_URL = "https://ggiidtwcfpfqwhrsxqre.supabase.co";
        const SB_KEY = "sb_publishable_65C-SaTkrEhz5I3aAr76mg_R1ZEzsyI";
        const sb = supabase.createClient(SB_URL, SB_KEY);

        let userIP = "";
        let editingTitle = null;

        async function manualRefresh() {
            await initSecurity(); 
            if (!document.getElementById('section-user').classList.contains('hidden') || 
                !document.getElementById('section-admin').classList.contains('hidden')) {
                await loadData(); 
            }
        }

        setInterval(() => {
            manualRefresh();
        }, 300000);

        async function initSecurity() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ipData = await res.json();
                userIP = ipData.ip;

                const { data: emg } = await sb.from('emergency').select('on, message').limit(1).maybeSingle();
                if (emg && emg.on) {
                    showBanned(emg.message || "Trwa przerwa techniczna.");
                    return;
                }

                const { data: banData } = await sb.from('bans').select('*').eq('ip', userIP).maybeSingle();
                if (banData && banData.is_banned) {
                    showBanned("Twoje IP zostało zablokowane.");
                    return;
                }

                if (!banData) {
                    await sb.from('bans').upsert({ ip: userIP, attempts: 0, is_banned: false }, { onConflict: 'ip' });
                }
            } catch (e) { console.error(e); }
        }

        function showBanned(reason) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('section-banned').classList.remove('hidden');
            document.getElementById('banned-reason').innerText = reason;
        }

        initSecurity();

        async function loadData() {
            const { data } = await sb.from('news').select('*');
            if (data) {
                const userDiv = document.getElementById('news-container');
                const adminDiv = document.getElementById('admin-list');
                userDiv.innerHTML = data.length ? "" : "Brak wiadomości.";
                adminDiv.innerHTML = "";
                data.slice().reverse().forEach(item => {
                    userDiv.innerHTML += `<div class="news-item"><b>${item.title}</b><p>${item.content}</p></div>`;
                    adminDiv.innerHTML += `<div class="admin-item"><b>${item.title}</b><div class="admin-btns"><button class="btn-edit" onclick="prepareEdit('${item.title.replace(/'/g, "\\'")}', '${item.content.replace(/'/g, "\\'")}')">Edytuj</button><button class="btn-del" onclick="deletePost('${item.title.replace(/'/g, "\\'")}')">Usuń</button></div></div>`;
                });
            }
            loadIPList();
        }

        async function loadIPList() {
            const container = document.getElementById('ip-admin-container');
            const { data } = await sb.from('bans').select('*');
            if (data) {
                container.innerHTML = data.map(b => `
                    <div class="ip-row">
                        IP: <b>${b.ip}</b> | Próby: ${b.attempts} | Ban: ${b.is_banned ? '<span style="color:red">TAK</span>' : 'NIE'}
                    </div>
                `).join('');
            }
        }

        async function saveLoginLog(ip) {
            if(!ip) return;
            // Wykrywanie urządzenia na podstawie User Agent
            const ua = navigator.userAgent;
            let device = "Inne / PC";
            if (/android/i.test(ua)) device = "Android";
            else if (/iPad|iPhone|iPod/.test(ua)) device = "iOS / iPhone";

            try {
                await sb.from('logs').insert([{ ip: ip, device: device }]);
            } catch (e) {
                console.error("Błąd zapisu logów:", e);
            }
        }

        async function checkAuth() {
            const p = document.getElementById('password-input').value;
            if (p === "klucz") { 
                show('section-user'); 
                loadData(); 
                saveLoginLog(userIP);
            }
            else if (p === "administracyjny") { 
                show('section-admin'); 
                loadData(); 
                saveLoginLog(userIP);
            }
            else { 
                document.getElementById('error-msg').innerText = "Błędne hasło!";
                if(userIP) {
                    const { data } = await sb.from('bans').select('attempts').eq('ip', userIP).maybeSingle();
                    const newAttempts = (data ? data.attempts : 0) + 1;
                    await sb.from('bans').update({ attempts: newAttempts }).eq('ip', userIP);
                }
            }
        }

        async function handleSave() {
            const t = document.getElementById('post-title').value;
            const c = document.getElementById('post-content').value;
            if(!t || !c) return;
            if (editingTitle) { await sb.from('news').update({ title: t, content: c }).eq('title', editingTitle); }
            else { await sb.from('news').insert([{ title: t, content: c }]); }
            resetForm(); loadData();
        }

        function prepareEdit(title, content) {
            editingTitle = title;
            document.getElementById('post-title').value = title;
            document.getElementById('post-content').value = content;
            document.getElementById('btn-save').innerText = "Zapisz zmiany";
            document.getElementById('btn-cancel').classList.remove('hidden');
        }

        function resetForm() {
            editingTitle = null;
            document.getElementById('post-title').value = "";
            document.getElementById('post-content').value = "";
            document.getElementById('btn-save').innerText = "Opublikuj";
            document.getElementById('btn-cancel').classList.add('hidden');
        }

        async function deletePost(title) {
            if (confirm("Usunąć?")) { await sb.from('news').delete().eq('title', title); loadData(); }
        }

        function show(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
