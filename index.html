<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Wiadomości SP24</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }
        h2 { color: #1c1e21; margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: #2d3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: #1a252f; }
        .hidden { display: none; }
        .news-item {
            text-align: left;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }
        .news-item h4 { margin: 0 0 5px 0; color: #2d3e50; }
        .news-item p { margin: 0; color: #4b4f56; font-size: 0.95em; }
        #admin-list div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            margin: 5px 0;
            padding: 8px;
            border-radius: 4px;
        }
        .del-btn { background: #ff4d4d; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="section-login" class="container">
        <h2>Podaj hasło:</h2>
        <input type="password" id="password-input" placeholder="Wpisz hasło...">
        <button onclick="checkAuth()">Zatwierdź</button>
        <p id="error-msg" style="color: red; font-size: 14px; margin-top: 10px;"></p>
    </div>

    <div id="section-user" class="container hidden">
        <h2>Aktualności</h2>
        <div id="news-container">Ładowanie wiadomości...</div>
        <br>
        <button onclick="location.reload()">Wyloguj</button>
    </div>

    <div id="section-admin" class="container hidden">
        <h2>Panel Administratora</h2>
        <input type="text" id="post-title" placeholder="Tytuł wiadomości">
        <textarea id="post-content" rows="4" placeholder="Treść wiadomości..."></textarea>
        <button onclick="publishNews()">Opublikuj post</button>
        <hr>
        <h4>Zarządzaj postami:</h4>
        <div id="admin-list"></div>
        <br>
        <button onclick="location.reload()">Wyloguj</button>
    </div>

    <script>
        // --- KONFIGURACJA SUPABASE ---
        const SB_URL = "https://ggiidtwcfpfqwhrsxqre.supabase.co";
        const SB_KEY = "sb_publishable_65C-SaTkrEhz5I3aAr76mg_R1ZEzsyI";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        // Funkcja logowania
        function checkAuth() {
            const pass = document.getElementById('password-input').value;
            if (pass === "klucz") {
                showSection('section-user');
                loadNews();
            } else if (pass === "administracyjny") {
                showSection('section-admin');
                loadNews();
            } else {
                document.getElementById('error-msg').innerText = "Błędne hasło!";
            }
        }

        // Pobieranie newsów z bazy
        async function loadNews() {
            const { data: news, error } = await supabaseClient
                .from('news')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error("Błąd pobierania:", error);
                return;
            }

            // Lista dla użytkownika
            const userContainer = document.getElementById('news-container');
            userContainer.innerHTML = news.length ? "" : "Brak nowych wiadomości.";
            
            // Lista dla admina
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = "";

            news.forEach(item => {
                // Widok usera
                userContainer.innerHTML += `
                    <div class="news-item">
                        <h4>${item.title}</h4>
                        <p>${item.content}</p>
                    </div>
                `;
                // Widok admina (z przyciskiem usuwania)
                adminList.innerHTML += `
                    <div>
                        <span>${item.title}</span>
                        <button class="del-btn" onclick="deleteNews(${item.id})">Usuń</button>
                    </div>
                `;
            });
        }

        // Dodawanie newsa
        async function publishNews() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;

            if (!title || !content) return alert("Wypełnij wszystkie pola!");

            const { error } = await supabaseClient
                .from('news')
                .insert([{ title, content }]);

            if (error) {
                alert("Błąd zapisu!");
            } else {
                document.getElementById('post-title').value = "";
                document.getElementById('post-content').value = "";
                loadNews();
            }
        }

        // Usuwanie newsa
        async function deleteNews(id) {
            if (!confirm("Na pewno usunąć ten post?")) return;
            await supabaseClient.from('news').delete().eq('id', id);
            loadNews();
        }

        // Pomocnicza funkcja do przełączania widoków
        function showSection(id) {
            document.getElementById('section-login').classList.add('hidden');
            document.getElementById('section-user').classList.add('hidden');
            document.getElementById('section-admin').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        // Automatyczne odświeżanie newsów co 10 sekund (Realtime)
        setInterval(() => {
            if (!document.getElementById('section-login').classList.contains('hidden')) return;
            loadNews();
        }, 10000);
    </script>
</body>
</html>
